<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP練習作成</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="main-visual">
        <div class="main-visual-content">
            <h1>デザインから実装まで、<br>一貫してあなたのビジネスをサポート</h1>
            <p>ここに簡単なキャッチコピーや説明文が入ります。</p>
            <a href="#" class="cta-button">お問い合わせはこちら</a>
        </div>
    </section>

    <section class="features">
        <div class="container">
            <h2 class="section-title">選ばれる3つの理由</h2>
            
            <div class="features-grid">
                <div class="feature-item">
                    <div class="feature-icon">🎨</div>
                    <h3>一貫したデザイン</h3>
                    <p>GIMPを活用し、ターゲットに刺さる最適なカラー補正とレイアウトをご提案します。</p>
                </div>
                
                <div class="feature-item">
                    <div class="feature-icon">💻</div>
                    <h3>迅速なサイト実装</h3>
                    <p>HTML/CSS/JavaScriptを用い、デザインのイメージをそのままWEB上に再現します。</p>
                </div>
                
                <div class="feature-item">
                    <div class="feature-icon">🤖</div>
                    <h3>業務の自動化まで</h3>
                    <p>GAS（Google Apps Script）を組み合わせ、納品後のデータ管理や効率化までサポートします。</p>
                </div>
            </div>

        </div>
    </section>

</body>
</html>
